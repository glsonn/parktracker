<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Park Tracker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- LANDING VIEW -->
    <div id="landing-view">
      <div class="app-container">
        <div class="landing-content">
          <h1>ParkTracker</h1>
          <p>Track your visits. Build your park passport.</p>

          <button id="start-button">Start Exploring</button>
        </div>
      </div>
    </div>

    <!-- APP VIEW -->
    <div id="app-view" class="app-container" style="display: none">
      <h1>Wisconsin State Parks</h1>

      <div id="nav">
        <button id="nav-dashboard">Dashboard</button>
        <button id="nav-parks">Parks</button>
      </div>

      <p id="visit-counter">You’ve visited 0 parks</p>

      <div id="filter-container">
        <label>
          <input type="checkbox" id="filter-unvisited" />
          Show unvisited only
        </label>
      </div>

      <!-- LIST VIEW -->
      <div id="list-view">
        <ul id="parks-list"></ul>
      </div>

      <!-- DETAIL VIEW -->
      <div id="detail-view">
        <button id="back-button">← Back</button>
        <h2 id="park-name"></h2>
        <p id="park-location"></p>
        <p id="park-county"></p>
        <p id="park-description"></p>

        <hr />

        <div id="visit-action">
          <label for="visit-date">Select visit date:</label>
          <input type="date" id="visit-date" />

          <label for="visit-notes">Notes (optional):</label>
          <textarea
            id="visit-notes"
            rows="3"
            placeholder="What made this visit memorable?"
          ></textarea>

          <button id="visit-button">Mark as Visited</button>
        </div>

        <h3>Your Visits</h3>
        <div id="visit-history"></div>
      </div>

      <div id="dashboard-view">
        <h2>Recent Visits</h2>
        <div id="recent-visits"></div>
      </div>

      <h3>Your Progress</h3>

      <div id="total-progress-container">
        <div id="total-progress-bar"></div>
      </div>
      <p id="total-progress-text"></p>

      <div id="next-achievement">
        <h3>Next Achievement</h3>
        <p id="next-achievement-title"></p>
        <div id="progress-bar-container">
          <div id="progress-bar"></div>
        </div>
        <p id="progress-text"></p>
      </div>

      <div id="achievements-panel">
        <h3>Achievements</h3>
        <ul id="achievements-list"></ul>
      </div>
    </div>

    <script src="env.js"></script>
    <script src="app.js"></script>

    <footer class="app-footer">
      <a href="/index.html">Home</a> |
      <a href="/privacy.html">Privacy Policy</a> |
      <a href="/terms.html">Terms of Use</a> |
      <span
        >Contact:
        <a href="mailto:contact@parktracker.app"
          >contact@parktracker.app</a
        ></span
      >
    </footer>
    <script defer src="/_vercel/insights/script.js"></script>
  </body>
</html>
