<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>State Parks Passport</title>
    <style>
      html {
        font-size: 16px;
      }

      body {
        font-family: Arial, sans-serif;
        font-size: 1rem;
        margin: 0;
        padding: 10px;
      }

      li {
        cursor: pointer;
      }
      #detail-view {
        display: none;
      }

      /* Highlight animation */
      @keyframes achievement-pop {
        0% {
          background-color: #fff3a0;
          transform: scale(1.05);
        }
        100% {
          background-color: transparent;
          transform: scale(1);
        }
      }

      .achievement-new {
        animation: achievement-pop 1s ease;
        border-radius: 4px;
        padding: 4px;
      }

      #progress-bar-container {
        width: 100%;
        height: 12px;
        background: #ddd;
        border-radius: 6px;
        overflow: hidden;
      }

      #progress-bar {
        height: 100%;
        width: 0%;
        background: #4caf50;
        transition:
          width 0.3s ease,
          background-color 0.3s ease;
      }

      #total-progress-container {
        width: 100%;
        height: 12px;
        background: #ddd;
        border-radius: 6px;
        overflow: hidden;
        margin-bottom: 6px;
      }

      #total-progress-bar {
        background: #4caf50;
        height: 100%;
        width: 0%;
        transition: width 0.3s ease;
      }

      #visit-action {
        margin-top: 10px;
      }

      #visit-history {
        margin: 10px 0;
      }

      #dashboard-view {
        margin: 20px 0;
      }

      .recent-visit {
        padding: 6px 0;
        border-bottom: 1px solid #eee;
      }

      #nav {
        margin: 10px 0 20px;
      }

      #nav button {
        margin-right: 10px;
        padding: 10px 14px;
        font-size: 1rem;
        cursor: pointer;
      }

      .recent-visit:hover {
        background-color: #f5f5f5;
      }

      .loading {
        color: #666;
        font-style: italic;
      }

      .empty-state {
        color: #666;
        text-align: center;
        padding: 10px 0;
      }

      @media (max-width: 600px) {
        body {
          font-size: 1.1rem;
          padding: 12px;
        }

        h1 {
          font-size: 1.6rem;
        }

        h2 {
          font-size: 1.3rem;
        }

        li {
          padding: 8px 0;
        }

        button {
          font-size: 1.1rem;
          padding: 12px 16px;
        }
      }

      #park-location,
      #park-county {
        display: block;
        margin: 4px 0;
        color: #444;
      }

      body {
        font-family: Arial, sans-serif;
        font-size: 1rem;
        margin: 0;
        padding: 10px;
        background-color: #f9fafb;
      }

      .app-container {
        max-width: 700px;
        margin: 0 auto;
      }

      h1 {
        margin-bottom: 10px;
      }

      h2,
      h3 {
        margin-top: 24px;
        margin-bottom: 10px;
      }

      #dashboard-view,
      #next-achievement,
      #achievements-panel,
      #detail-view {
        margin-top: 24px;
      }

      p {
        margin: 6px 0 12px;
      }

      .progress-section {
        margin-top: 24px;
      }

      #total-progress-text,
      #progress-text {
        font-size: 0.9rem;
        color: #555;
      }

      button {
        background-color: #2f855a;
        color: white;
        border: none;
        border-radius: 6px;
        padding: 10px 14px;
        margin-top: 8px;
      }

      button:hover {
        background-color: #276749;
      }

      #visit-action label {
        display: block;
        margin-top: 10px;
        font-weight: 600;
      }

      #visit-action textarea {
        width: 100%;
        padding: 8px;
        margin-top: 4px;
        border-radius: 4px;
        border: 1px solid #ccc;
        font-family: inherit;
        font-size: 1rem;
        box-sizing: border-box;
      }

      .visit-entry {
        margin-bottom: 10px;
      }

      .visit-notes {
        margin-left: 10px;
        font-style: italic;
        color: #555;
      }

      .app-footer {
        text-align: center;
        margin-top: 40px;
        padding: 20px;
        font-size: 0.9rem;
        color: #666;
        border-top: 1px solid #e0e0e0;
      }

      .app-footer a {
        color: #0066cc;
        text-decoration: none;
        margin: 0 5px;
      }

      .app-footer a:hover {
        text-decoration: underline;
      }

      .footer-separator {
        color: #999;
      }
    </style>
  </head>
  <body>
    <div class="app-container">
      <h1>Wisconsin State Parks</h1>

      <div id="nav">
        <button id="nav-dashboard">Dashboard</button>
        <button id="nav-parks">Parks</button>
      </div>

      <p id="visit-counter">You’ve visited 0 parks</p>

      <div id="filter-container">
        <label>
          <input type="checkbox" id="filter-unvisited" />
          Show unvisited only
        </label>
      </div>

      <!-- LIST VIEW -->
      <div id="list-view">
        <ul id="parks-list"></ul>
      </div>

      <!-- DETAIL VIEW -->
      <div id="detail-view">
        <button id="back-button">← Back</button>
        <h2 id="park-name"></h2>
        <p id="park-location"></p>
        <p id="park-county"></p>
        <p id="park-description"></p>

        <hr />

        <div id="visit-action">
          <label for="visit-date">Select visit date:</label>
          <input type="date" id="visit-date" />

          <label for="visit-notes">Notes (optional):</label>
          <textarea
            id="visit-notes"
            rows="3"
            placeholder="What made this visit memorable?"
          ></textarea>

          <button id="visit-button">Mark as Visited</button>
        </div>

        <h3>Your Visits</h3>
        <div id="visit-history"></div>
      </div>

      <div id="dashboard-view">
        <h2>Recent Visits</h2>
        <div id="recent-visits"></div>
      </div>

      <h3>Your Progress</h3>

      <div id="total-progress-container">
        <div id="total-progress-bar"></div>
      </div>
      <p id="total-progress-text"></p>

      <div id="next-achievement">
        <h3>Next Achievement</h3>
        <p id="next-achievement-title"></p>
        <div id="progress-bar-container">
          <div id="progress-bar"></div>
        </div>
        <p id="progress-text"></p>
      </div>

      <div id="achievements-panel">
        <h3>Achievements</h3>
        <ul id="achievements-list"></ul>
      </div>
    </div>

    <script src="env.js"></script>
    <script src="app.js"></script>

    <footer class="app-footer">
      <a href="/privacy.html">Privacy Policy</a>
      <span class="footer-separator">|</span>
      <a href="/terms.html">Terms of Use</a>
    </footer>
    <script defer src="/_vercel/insights/script.js"></script>
  </body>
</html>
